<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior CRM - O'quv Markazi</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090f;
            --bg2: #111119;
            --bg3: #16161f;
            --card: #1a1a26;
            --card2: #1f1f2e;
            --border: #252535;
            --orange: #ff6b1a;
            --orange2: #ff8c42;
            --green: #00d68f;
            --red: #ff4d6d;
            --blue: #3d9cff;
            --purple: #9b59b6;
            --text: #f0f0ff;
            --text2: #9898b8;
            --text3: #4a4a6a;
            --sw: 220px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ======= LOGIN ======= */
        #login-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        #login-wrap::before {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(255, 107, 26, .12) 0%, transparent 70%);
            top: -250px;
            right: -250px;
            pointer-events: none;
        }

        #login-wrap::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(61, 156, 255, .07) 0%, transparent 70%);
            bottom: -200px;
            left: -200px;
            pointer-events: none;
        }

        .lgo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            animation: fD .6s ease;
        }

        .lgo-ic {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, #ff6b1a, #9b59b6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: #fff;
            margin-bottom: 14px;
            box-shadow: 0 0 50px rgba(255, 107, 26, .35);
        }

        .lgo-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 3px;
        }

        .lgo-name span {
            color: var(--orange);
        }

        .lgo-sub {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--text2);
            font-weight: 600;
            margin-top: 4px;
        }

        .lcard {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 44px 40px;
            width: 100%;
            max-width: 440px;
            animation: fU .7s ease;
            position: relative;
            z-index: 1;
        }

        .lcard h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .fl {
            margin-bottom: 20px;
        }

        .fl-lb {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .fi {
            width: 100%;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: var(--text);
            outline: none;
            transition: border-color .2s;
        }

        .fi:focus {
            border-color: var(--orange);
        }

        .fi::placeholder {
            color: var(--text3);
        }

        .pw {
            position: relative;
        }

        .pw .fi {
            padding-right: 48px;
        }

        .eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 18px;
        }

        .lerr {
            background: rgba(255, 77, 109, .12);
            border: 1px solid rgba(255, 77, 109, .3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 16px;
            display: none;
        }

        .btn-lg {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--orange), var(--orange2));
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            cursor: pointer;
            transition: all .2s;
            margin-top: 8px;
        }

        .btn-lg:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 26, .4);
        }

        .l-hint {
            margin-top: 20px;
            padding: 14px;
            background: var(--bg2);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text3);
            line-height: 1.8;
        }

        .l-hint strong {
            color: var(--text2);
        }

        .lfoot {
            margin-top: 28px;
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            letter-spacing: 2px;
            z-index: 1;
        }

        /* ======= LAYOUT ======= */
        #app {
            display: none;
        }

        #app.active {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sw);
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 100;
            padding: 20px 0;
        }

        .s-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 18px 18px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .s-logo-ic {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--orange), #9b59b6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            color: #fff;
        }

        .s-logo-t strong {
            font-size: 15px;
            font-weight: 800;
            display: block;
        }

        .s-logo-t span {
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 1px;
        }

        .nav-sec {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text3);
            padding: 10px 18px 6px;
        }

        .ni {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 18px;
            cursor: pointer;
            border-radius: 10px;
            margin: 2px 8px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text2);
            transition: all .2s;
            text-decoration: none;
        }

        .ni:hover {
            background: var(--card);
            color: var(--text);
        }

        .ni.active {
            background: var(--orange);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(255, 107, 26, .3);
        }

        .ni .ico {
            font-size: 16px;
            width: 18px;
            text-align: center;
        }

        .ni .badge {
            margin-left: auto;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 7px;
            border-radius: 20px;
        }

        .s-bottom {
            margin-top: auto;
            padding: 14px 8px 0;
            border-top: 1px solid var(--border);
        }

        .s-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--card);
            border-radius: 10px;
            cursor: pointer;
        }

        .s-ua {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            flex-shrink: 0;
        }

        .s-ui {
            flex: 1;
            overflow: hidden;
        }

        .s-un {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .s-ur {
            font-size: 10px;
            color: var(--text3);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .s-out {
            font-size: 16px;
            color: var(--text3);
            cursor: pointer;
            transition: color .2s;
            background: none;
            border: none;
            padding: 4px;
        }

        .s-out:hover {
            color: var(--red);
        }

        .content {
            margin-left: var(--sw);
            flex: 1;
            padding: 36px 40px;
            overflow-y: auto;
            min-height: 100vh;
        }

        .page {
            display: none;
            animation: fI .3s ease;
        }

        .page.active {
            display: block;
        }

        /* ======= PAGE HEADERS ======= */
        .ptag {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--orange);
            margin-bottom: 4px;
        }

        .ptitle {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 46px;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 28px;
        }

        .ptitle span {
            color: var(--orange);
        }

        .ptitle.teal span {
            color: var(--green);
        }

        .ptitle.blue span {
            color: var(--blue);
        }

        /* ======= CARDS ======= */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
        }

        .card2 {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
        }

        /* ======= GRID ======= */
        .g2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .g3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .g4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 14px;
        }

        /* ======= BUTTONS ======= */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .btn-or {
            background: var(--orange);
            color: #fff;
        }

        .btn-or:hover {
            background: var(--orange2);
            transform: translateY(-1px);
        }

        .btn-gr {
            background: rgba(0, 214, 143, .15);
            border: 1px solid rgba(0, 214, 143, .3);
            color: var(--green);
        }

        .btn-gr:hover {
            background: rgba(0, 214, 143, .25);
        }

        .btn-rd {
            background: rgba(255, 77, 109, .15);
            border: 1px solid rgba(255, 77, 109, .3);
            color: var(--red);
        }

        .btn-rd:hover {
            background: rgba(255, 77, 109, .25);
        }

        .btn-bl {
            background: rgba(61, 156, 255, .15);
            border: 1px solid rgba(61, 156, 255, .3);
            color: var(--blue);
        }

        .btn-bl:hover {
            background: rgba(61, 156, 255, .25);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-ghost:hover {
            border-color: var(--orange);
            color: var(--orange);
        }

        .btn-sm {
            padding: 7px 14px;
            font-size: 12px;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        /* ======= STAT CARDS ======= */
        .stat-card {
            border-radius: 18px;
            padding: 22px 24px;
        }

        .stat-card .sc-ic {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 14px;
        }

        .stat-card .sc-lb {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .stat-card .sc-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 44px;
            line-height: 1;
        }

        .balance-grad {
            background: linear-gradient(135deg, #c0392b, #9b59b6, #6c3483);
            position: relative;
            overflow: hidden;
        }

        .balance-grad::before {
            content: '';
            position: absolute;
            right: -20px;
            top: -20px;
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, .07);
            border-radius: 50%;
        }

        .bg-add {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, .15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: background .2s;
            border: none;
        }

        .bg-add:hover {
            background: rgba(255, 255, 255, .25);
        }

        /* ======= TABLE ======= */
        .tbl {
            width: 100%;
            border-collapse: collapse;
        }

        .tbl th {
            padding: 11px 16px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text3);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .tbl td {
            padding: 13px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            vertical-align: middle;
        }

        .tbl tr:last-child td {
            border-bottom: none;
        }

        .tbl tr:hover td {
            background: rgba(255, 255, 255, .02);
        }

        /* ======= BADGES ======= */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            padding: 4px 11px;
            border-radius: 20px;
        }

        .bg-green {
            background: rgba(0, 214, 143, .15);
            color: var(--green);
        }

        .bg-red {
            background: rgba(255, 77, 109, .15);
            color: var(--red);
        }

        .bg-orange {
            background: rgba(255, 107, 26, .15);
            color: var(--orange);
        }

        .bg-blue {
            background: rgba(61, 156, 255, .15);
            color: var(--blue);
        }

        .bg-gray {
            background: rgba(152, 152, 184, .12);
            color: var(--text2);
        }

        /* ======= FORM ======= */
        .form-row {
            margin-bottom: 16px;
        }

        .form-lb {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .form-in {
            width: 100%;
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 11px;
            padding: 12px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .2s;
        }

        .form-in:focus {
            border-color: var(--orange);
        }

        .form-in::placeholder {
            color: var(--text3);
        }

        select.form-in {
            cursor: pointer;
        }

        textarea.form-in {
            resize: vertical;
            min-height: 80px;
        }

        /* ======= MODAL ======= */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-bg.open {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            animation: fU .3s ease;
            position: relative;
        }

        .modal-h {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
        }

        .modal-x {
            background: none;
            border: none;
            color: var(--text3);
            font-size: 22px;
            cursor: pointer;
            transition: color .2s;
        }

        .modal-x:hover {
            color: var(--red);
        }

        /* ======= NOTIFICATIONS ======= */
        .notif {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            z-index: 9999;
            transform: translateY(80px);
            opacity: 0;
            transition: all .3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notif.show {
            transform: translateY(0);
            opacity: 1;
        }

        .notif.success {
            background: var(--green);
            color: #0a0a0f;
        }

        .notif.error {
            background: var(--red);
            color: #fff;
        }

        .notif.info {
            background: var(--blue);
            color: #fff;
        }

        /* ======= STUDENT SPECIFIC ======= */
        .attend-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .ad-came {
            background: rgba(0, 214, 143, .15);
            border: 2px solid var(--green);
        }

        .ad-missed {
            background: rgba(255, 77, 109, .15);
            border: 2px solid var(--red);
        }

        .task-card-s {
            border-radius: 16px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
            transition: all .2s;
        }

        .task-card-s:hover {
            transform: translateY(-3px);
            border-color: var(--orange);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
        }

        .task-img {
            height: 140px;
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            position: relative;
        }

        .task-ball {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, .75);
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
        }

        .task-body {
            padding: 18px;
        }

        .task-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .task-dl {
            font-size: 12px;
            color: var(--text3);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ======= MARKET ======= */
        .mkt-header {
            background: linear-gradient(135deg, var(--orange), #e74c3c, #c0392b);
            border-radius: 20px;
            padding: 30px 34px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .mkt-header::before {
            content: '';
            position: absolute;
            right: -50px;
            top: -50px;
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, .08);
            border-radius: 50%;
        }

        .mkt-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 3px;
        }

        .mkt-brand span {
            opacity: .75;
        }

        .mkt-tagline {
            font-size: 13px;
            font-weight: 600;
            opacity: .85;
            margin-top: 6px;
        }

        .mkt-bal {
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 14px 20px;
            text-align: right;
            z-index: 1;
            position: relative;
        }

        .mkt-bal-lbl {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            opacity: .7;
            margin-bottom: 4px;
        }

        .mkt-bal-n {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 34px;
        }

        .pcard {
            border-radius: 16px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
            transition: all .2s;
        }

        .pcard:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, .4);
        }

        .pcard-img {
            height: 160px;
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
        }

        .pcard-cnt {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 77, 109, .9);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .pcard-price {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, .75);
            color: #fff;
            font-size: 12px;
            font-weight: 800;

        function quickAttend(sid, status) {
            const today = new Date().toISOString().split('T')[0];
            const days = ['YAK', 'DUS', 'SEV', 'COR', 'PAY', 'JUM', 'SHA'];
            const day = days[new Date().getDay()];
            if (!DATA.attendance[sid]) DATA.attendance[sid] = [];
            const exists = DATA.attendance[sid].find(a => a.date === today);
            if (exists) { notify('⚠️ Bugun allaqachon belgilangan!', 'error'); return; }
            DATA.attendance[sid].unshift({ date: today, day, status });
            if (status === 'kelgan') {
                DATA.students[sid].coins += 10;
                DATA.coinHistory[sid] = DATA.coinHistory[sid] || [];
                DATA.coinHistory[sid].unshift({ type: '+', amount: 10, desc: `Darsga keldi (${today})`, date: today.slice(5) });
                notify(`✅ ${DATA.students[sid].name} - keldi! +10 coin`, 'success');
            } else {
                DATA.students[sid].coins = Math.max(0, DATA.students[sid].coins - 20);
                DATA.coinHistory[sid] = DATA.coinHistory[sid] || [];
                DATA.coinHistory[sid].unshift({ type: '-', amount: 20, desc: `Darsga kelmadi (${today})`, date: today.slice(5) });
                notify(`❌ ${DATA.students[sid].name} - kelmadi! -20 coin`, 'error');
            }
            saveData();
            renderAdminDash();
            renderAdminStudents();
        }

        function approveTask(tid, sid) {
            const task = DATA.tasks.find(t => t.id === tid);
            task.submissions[sid] = 'approved';
            DATA.students[sid].coins += task.points;
            DATA.coinHistory[sid] = DATA.coinHistory[sid] || [];
            DATA.coinHistory[sid].unshift({ type: '+', amount: task.points, desc: `"${task.title}" vazifasi tasdiqlandi`, date: new Date().toISOString().slice(5, 10) });
            saveData();
            notify(`✅ Tasdiqlandi! ${DATA.students[sid].name} +${task.points} coin`, 'success');
            renderAdminDash();
            renderAdminTasks();
        }

            notify(`❌ Vazifa rad etildi`, 'error');

            if (sn) sn.textContent = name.split(' ')[0];
        }

        function openChangePassword() {
            openModal('🔒 Parolni O\'zgartirish', `
    <div class="form-row">
      <div class="form-lb">HOZIRGI PAROL</div>
      <input class="form-in" id="cp-old" type="password" placeholder="Hozirgi parolingiz">
    </div>
    <div class="form-row">
      <div class="form-lb">YANGI PAROL</div>
      <input class="form-in" id="cp-new" type="password" placeholder="Yangi parol (kamida 3 belgi)">
    </div>
    <div class="form-row">
      <div class="form-lb">YANGI PAROLNI TASDIQLANG</div>
      <input class="form-in" id="cp-conf" type="password" placeholder="Parolni qayta kiriting">
    </div>
    <button class="btn btn-or btn-full" onclick="saveNewPassword()">🔒 Parolni Saqlash</button>
  `);
        }

        function saveNewPassword() {
            const oldP = document.getElementById('cp-old').value;
            const newP = document.getElementById('cp-new').value;
            const confP = document.getElementById('cp-conf').value;
            const st = DATA.students[currentUser.id];
            if (oldP !== st.password) { notify('❌ Hozirgi parol noto\'g\'ri!', 'error'); return; }
            if (newP.length < 3) { notify('⚠️ Parol kamida 3 belgidan iborat bo\'lsin!', 'error'); return; }
            if (newP !== confP) { notify('❌ Yangi parollar mos emas!', 'error'); return; }
            DATA.students[currentUser.id].password = newP;
            saveData();
            closeModal();
            notify('✅ Parol muvaffaqiyatli o\'zgartirildi!', 'success');
        }

        // ============================================================
        //  BARABAN (SPIN WHEEL)
        // ============================================================
        const WHEEL_PRIZES = [
            { label: '0', coins: 0, color: '#2a2a3a', textColor: '#5a5a7a', prob: 30 },
            { label: '1', coins: 1, color: '#1a2a1a', textColor: '#00d68f', prob: 25 },
            { label: '2', coins: 2, color: '#1a1a2e', textColor: '#3d9cff', prob: 20 },
            { label: '10', coins: 10, color: '#2a1a2a', textColor: '#9b59b6', prob: 12 },
            { label: '50', coins: 50, color: '#2a200a', textColor: '#f1c40f', prob: 7 },
            { label: '100', coins: 100, color: '#1a2a0a', textColor: '#00d68f', prob: 3.9 },
            { label: '150', coins: 150, color: '#2a0f0a', textColor: '#ff6b1a', prob: 2 },
            { label: '1000', coins: 1000, color: '#1a0a2a', textColor: '#ff6b1a', prob: 0.1 },
        ];
        const SPIN_COST = 300;
        const MAX_SPINS = 3;
        const TOTAL_SLOTS = WHEEL_PRIZES.length;

        let wheelAngle = 0;
        let isSpinning = false;

        function getSpinData(id) {
            const today = new Date().toISOString().split('T')[0];
            const key = `spin_${id}_${today}`;
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : { count: 0, date: today };
        }
        function saveSpinData(id, data) {
            const today = new Date().toISOString().split('T')[0];
            localStorage.setItem(`spin_${id}_${today}`, JSON.stringify(data));
        }

        function pickPrize() {
            const r = Math.random() * 100;
            let cum = 0;
            for (const p of WHEEL_PRIZES) {
                cum += p.prob;
                if (r < cum) return p;
            }
            return WHEEL_PRIZES[0];
        }

        function drawWheel(angle) {
            const canvas = document.getElementById('wheel-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const R = cx - 4;
            const arc = (2 * Math.PI) / TOTAL_SLOTS;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // outer glow ring
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, R + 3, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255,107,26,0.5)';
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.restore();

            WHEEL_PRIZES.forEach((prize, i) => {
                const startAngle = angle + i * arc;
                const endAngle = startAngle + arc;

                // slice
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, R, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // text
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(startAngle + arc / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = prize.textColor;
                ctx.font = `bold ${prize.coins >= 100 ? 18 : 22}px 'Outfit', sans-serif`;
                ctx.shadowColor = prize.textColor;
                ctx.shadowBlur = 6;
                ctx.fillText(prize.label, R - 14, 7);
                ctx.restore();
            });

            // center circle
            ctx.beginPath();
            ctx.arc(cx, cy, 36, 0, 2 * Math.PI);
            ctx.fillStyle = '#09090f';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,107,26,0.4)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function renderStudentBaraban() {
            const st = getSt();
            const sd = getSpinData(st.id);
            const remaining = MAX_SPINS - sd.count;
            const spinHistory = (DATA.coinHistory[st.id] || []).filter(c => c.desc.includes('Baraban')).slice(0, 8);

            document.getElementById('page-s-baraban').innerHTML = `
    <div class="ptag">OMAD SINASH VAQTI</div>
    <div class="ptitle">BARABAN <span>🎰</span></div>
    <div class="baraban-wrap">
      <div class="wheel-outer">
        <div class="wheel-pointer">▼</div>
        <canvas id="wheel-canvas" width="360" height="360"></canvas>
        <button class="wheel-center-btn" id="spin-btn" onclick="doSpin()"
          ${remaining <= 0 || st.coins < SPIN_COST ? 'disabled' : ''}>
          AYLAN<br>${SPIN_COST}🪙
        </button>
      </div>

      <div class="spin-info-grid">
        <div class="spin-info-box">
          <div class="spin-info-lbl">BALANSINGIZ</div>
          <div class="spin-info-val" style="color:var(--orange);">🪙 ${st.coins}</div>
        </div>
        <div class="spin-info-box">
          <div class="spin-info-lbl">QOLGAN URINISH</div>
          <div class="spin-info-val" style="color:${remaining > 0 ? 'var(--green)' : 'var(--red)'};">${remaining} / ${MAX_SPINS}</div>
        </div>
        <div class="spin-info-box">
          <div class="spin-info-lbl">NARXI</div>
          <div class="spin-info-val" style="color:var(--text2);">🪙 ${SPIN_COST}</div>
        </div>
      </div>

      <div class="card" style="width:100%;max-width:480px;padding:20px 24px;">
        <div style="font-size:12px;font-weight:800;letter-spacing:2px;color:var(--text3);margin-bottom:14px;">🏆 MUKOFOTLAR RO'YXATI</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${WHEEL_PRIZES.map(p => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:10px;">
              <div style="width:10px;height:10px;border-radius:50%;background:${p.textColor};flex-shrink:0;box-shadow:0 0 6px ${p.textColor};"></div>
              <div style="font-size:14px;font-weight:800;color:${p.textColor};">🪙 ${p.label}</div>
              <div style="margin-left:auto;font-size:11px;color:var(--text3);">${p.prob}%</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:14px;padding:12px 14px;background:rgba(255,107,26,.08);border:1px solid rgba(255,107,26,.2);border-radius:10px;font-size:12px;color:var(--text2);line-height:1.7;">
          ⚡ Har kuni <strong style="color:var(--orange);">3 marta</strong> aylantirish mumkin<br>
          💰 Har bir aylanish <strong style="color:var(--orange);">${SPIN_COST} coin</strong> sarflaydi<br>
          🏆 <strong style="color:var(--orange);">1000 coin</strong> tushish ehtimoli: <strong style="color:var(--red);">0.1%</strong> — Omadingiz!
        </div>
      </div>

      ${spinHistory.length ? `
        <div class="baraban-history">
          <div style="font-size:12px;font-weight:800;letter-spacing:2px;color:var(--text3);margin-bottom:12px;">📋 OXIRGI NATIJALAR</div>
          ${spinHistory.map(c => `
            <div class="coin-flow-item" style="margin-bottom:8px;">
              <div class="cf-icon ${c.type === '+' ? 'cf-plus' : 'cf-minus'}">${c.type === '+' ? '🎰' : '🎰'}</div>
              <div style="flex:1;"><div class="cf-amount" style="color:${c.type === '+' ? 'var(--green)' : 'var(--red)'};">${c.type}${c.amount} coin</div><div class="cf-desc">${c.desc}</div></div>
              <div class="cf-date">${c.date}</div>
            </div>`).join('')}
        </div>` : ''}
    </div>
    <div class="pfoot">© 2026 SENIOR CRM • ALL RIGHTS RESERVED</div>`;

            // Draw wheel after render
            setTimeout(() => drawWheel(wheelAngle), 50);
        }

        function doSpin() {
            const st = DATA.students[currentUser.id];
            const sd = getSpinData(st.id);

            if (isSpinning) return;
            if (sd.count >= MAX_SPINS) { notify('❌ Bugun uchun urinishlar tugadi! Ertaga keling 🌅', 'error'); return; }
            if (st.coins < SPIN_COST) { notify(`❌ Yetarli coin yo'q! Kerak: ${SPIN_COST}🪙`, 'error'); return; }

            // Deduct cost
            st.coins -= SPIN_COST;
            sd.count++;
            saveSpinData(st.id, sd);

            // Pick prize
            const prize = pickPrize();

            // Calculate target angle: pointer is at top (270deg = -π/2)
            // We want prize slice to land under pointer
            const sliceAngle = (2 * Math.PI) / TOTAL_SLOTS;
            const prizeIdx = WHEEL_PRIZES.indexOf(prize);
            const targetSlice = -prizeIdx * sliceAngle - sliceAngle / 2; // center of slice at top
            const spins = 5 + Math.random() * 3; // 5-8 full rotations
            const finalAngle = targetSlice - spins * 2 * Math.PI;

            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;

            // Animate
            const startAngle = wheelAngle;
            const totalDelta = finalAngle - startAngle;
            const duration = 4000 + Math.random() * 1500;
            const startTime = performance.now();

            function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeOut(progress);
                wheelAngle = startAngle + totalDelta * eased;
                drawWheel(wheelAngle);
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    wheelAngle = finalAngle % (2 * Math.PI);
                    isSpinning = false;
                    onSpinEnd(prize);
                }
            }
            requestAnimationFrame(animate);
        }

        function onSpinEnd(prize) {
            const st = DATA.students[currentUser.id];

            // Add prize coins
            if (prize.coins > 0) {
                st.coins += prize.coins;
                DATA.coinHistory[st.id] = DATA.coinHistory[st.id] || [];
                DATA.coinHistory[st.id].unshift({
                    type: '+', amount: prize.coins,
                    desc: `Baraban: 🎰 ${prize.coins} coin yutdi!`,
                    date: new Date().toISOString().slice(5, 10)
                });
            } else {
                DATA.coinHistory[st.id] = DATA.coinHistory[st.id] || [];
                DATA.coinHistory[st.id].unshift({
                    type: '-', amount: SPIN_COST,
                    desc: `Baraban: 0 coin — baxt kulib baqmadi 😅`,
                    date: new Date().toISOString().slice(5, 10)
                });
            }
            saveData();

            // Show prize popup
            showPrizePopup(prize);
        }

        function showPrizePopup(prize) {
            const isJackpot = prize.coins === 1000;
            const isBig = prize.coins >= 100;

            // Confetti for big wins
            if (isBig) spawnConfetti();

            const popup = document.createElement('div');
            popup.className = 'prize-pop';
            popup.id = 'prize-pop';
            popup.innerHTML = `
    <div class="prize-box" style="${isJackpot ? 'border-color:#f1c40f;box-shadow:0 0 60px rgba(241,196,15,.4);' : ''}">
      <div class="prize-emoji">${isJackpot ? '🏆' : prize.coins >= 100 ? '🎉' : prize.coins >= 10 ? '😊' : prize.coins > 0 ? '🙂' : '😅'}</div>
      <div class="prize-title" style="color:${isJackpot ? '#f1c40f' : 'var(--text)'};">
        ${isJackpot ? 'JACKPOT!!!' : prize.coins >= 100 ? 'AJOYIB!' : prize.coins >= 10 ? 'YAXSHI!' : prize.coins > 0 ? 'NATIJA' : 'OMADSIZLIK'}
      </div>
      <div class="prize-amount" style="color:${prize.coins === 0 ? 'var(--text3)' : isJackpot ? '#f1c40f' : 'var(--orange)'};">
        ${prize.coins > 0 ? '+' : ''}${prize.coins} 🪙
      </div>
      <div class="prize-sub">${isJackpot ? '🎊 Tabriklaymiz! Jackpot yutdingiz! Bu 0.1% ehtimol! 🎊' :
                    prize.coins >= 100 ? 'Zo\'r natija! Coinlaringiz hisobga olindi.' :
                        prize.coins > 0 ? 'Coinlaringiz hisobingizga qo\'shildi.' :
                            'Keyingi safar omad kulib boqsin! 💪'
                }</div>
      <button class="btn btn-or btn-full" onclick="closePrizePopup()" style="font-size:15px;padding:14px;">
        ${prize.coins > 0 ? '🎉 Qabul qilish' : '💪 Qayta urinish'}
      </button>
    </div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.classList.add('show'), 10);
        }

        function closePrizePopup() {
            const pop = document.getElementById('prize-pop');
            if (pop) { pop.classList.remove('show'); setTimeout(() => pop.remove(), 300); }
            // Re-render baraban page with updated coins
            renderStudentBaraban();
            renderStudentDash();
        }

        function spawnConfetti() {
            const colors = ['#ff6b1a', '#f1c40f', '#00d68f', '#3d9cff', '#9b59b6', '#ff4d6d'];
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confetti-piece';
                    el.style.cssText = `
        left:${Math.random() * 100}vw;
        top:${50 + Math.random() * 30}vh;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-delay:${Math.random() * 0.5}s;
        transform:rotate(${Math.random() * 360}deg);
      `;
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 2000);
                }, i * 20);
            }
        }


        function openModal(title, body) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal-bg').classList.add('open');
        }
        function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
        document.getElementById('modal-bg').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

        // ============================================================
        //  NOTIFICATION
        // ============================================================
        let notifTimer = null;
        function notify(msg, type = 'success') {
            const n = document.getElementById('notif');
            n.textContent = msg;
            n.className = `notif show ${type}`;
            if (notifTimer) clearTimeout(notifTimer);
            notifTimer = setTimeout(() => n.classList.remove('show'), 3500);
        }
    </script>
</body>

</html>
